name: Init Repo (generate CLAUDE.md)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SF_AUTH_URL:
        required: true

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install -g @salesforce/cli

      - name: Authenticate Salesforce org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth.txt --alias pipeline-org --set-default
          rm /tmp/sf-auth.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone llm-sfdc-gh and install runner dependencies
        run: |
          gh repo clone 0cv/llm-sfdc-gh /tmp/llm-sfdc-gh -- --depth 1
          cd /tmp/llm-sfdc-gh && npm install
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude init session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx /tmp/llm-sfdc-gh/src/runner/init-repo.ts
