name: Fix from GitHub Issue

on:
  workflow_call:
    inputs:
      issueNumber:
        type: string
        required: true
      issueTitle:
        type: string
        required: true
      issueBody:
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SF_AUTH_URL:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g @salesforce/cli
          npm install @anthropic-ai/claude-agent-sdk @anthropic-ai/sdk pino dotenv

      - name: Authenticate Salesforce org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth.txt --alias pipeline-org --set-default
          rm /tmp/sf-auth.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch prompt and runner from llm-sfdc-gh
        run: |
          gh api repos/0cv/llm-sfdc-gh/contents/prompts/fix-issue.md \
            --jq '.content' | base64 -d > /tmp/fix-issue.md
          gh api repos/0cv/llm-sfdc-gh/contents/src/runner/fix-from-issue.ts \
            --jq '.content' | base64 -d > /tmp/fix-from-issue.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude fix-from-issue session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ inputs.issueNumber }}
          ISSUE_TITLE: ${{ inputs.issueTitle }}
          ISSUE_BODY: ${{ inputs.issueBody }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx /tmp/fix-from-issue.ts
