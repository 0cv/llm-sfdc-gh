name: Fix from GitHub Issue

on:
  workflow_call:
    inputs:
      issueNumber:
        type: string
        required: true
      issueTitle:
        type: string
        required: true
      issueBody:
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SF_AUTH_URL:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install -g @salesforce/cli

      - name: Authenticate Salesforce org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth.txt --alias pipeline-org --set-default
          rm /tmp/sf-auth.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone llm-sfdc-gh and install runner dependencies
        run: |
          gh repo clone 0cv/llm-sfdc-gh /tmp/llm-sfdc-gh -- --depth 1
          cd /tmp/llm-sfdc-gh && npm install
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude fix-from-issue session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issueNumber }}
          ISSUE_TITLE: ${{ inputs.issueTitle }}
          ISSUE_BODY: ${{ inputs.issueBody }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx /tmp/llm-sfdc-gh/src/runner/fix-from-issue.ts
