name: Fix Salesforce Error

on:
  workflow_call:
    inputs:
      subject:
        type: string
      orgName:
        type: string
      exceptionType:
        type: string
        required: true
      errorMessage:
        type: string
      apexClass:
        type: string
        required: true
      triggerName:
        type: string
      triggerOperation:
        type: string
      lineNumber:
        type: string
      stackTrace:
        type: string
      rawBody:
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SF_AUTH_URL:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install -g @salesforce/cli

      - name: Authenticate Salesforce org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth.txt --alias pipeline-org --set-default
          rm /tmp/sf-auth.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone llm-sfdc-gh and install runner dependencies
        run: |
          gh repo clone 0cv/llm-sfdc-gh /tmp/llm-sfdc-gh -- --depth 1
          cd /tmp/llm-sfdc-gh && npm install
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude fix session
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          EMAIL_SUBJECT: ${{ inputs.subject }}
          ORG_NAME: ${{ inputs.orgName }}
          EXCEPTION_TYPE: ${{ inputs.exceptionType }}
          ERROR_MESSAGE: ${{ inputs.errorMessage }}
          APEX_CLASS: ${{ inputs.apexClass }}
          TRIGGER_NAME: ${{ inputs.triggerName }}
          TRIGGER_OPERATION: ${{ inputs.triggerOperation }}
          LINE_NUMBER: ${{ inputs.lineNumber }}
          STACK_TRACE: ${{ inputs.stackTrace }}
          RAW_BODY: ${{ inputs.rawBody }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx /tmp/llm-sfdc-gh/src/runner/fix-from-error.ts
