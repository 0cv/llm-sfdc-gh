name: Fix Salesforce Error

on:
  workflow_call:
    inputs:
      exceptionType:
        type: string
        required: true
      errorMessage:
        type: string
      apexClass:
        type: string
        required: true
      lineNumber:
        type: string
      stackTrace:
        type: string
      rawBody:
        type: string
    secrets:
      ANTHROPIC_AUTH_TOKEN:
        required: true
      SF_AUTH_URL:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g @salesforce/cli
          npm install @anthropic-ai/claude-agent-sdk @anthropic-ai/sdk pino dotenv

      - name: Authenticate Salesforce org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > /tmp/sf-auth.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sf-auth.txt --alias pipeline-org --set-default
          rm /tmp/sf-auth.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch prompt and runner from llm-sfdc-gh
        run: |
          gh api repos/0cv/llm-sfdc-gh/contents/prompts/fix-error.md \
            --jq '.content' | base64 -d > /tmp/fix-error.md
          gh api repos/0cv/llm-sfdc-gh/contents/src/runner/fix-from-error.ts \
            --jq '.content' | base64 -d > /tmp/fix-from-error.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude fix session
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          EXCEPTION_TYPE: ${{ inputs.exceptionType }}
          ERROR_MESSAGE: ${{ inputs.errorMessage }}
          APEX_CLASS: ${{ inputs.apexClass }}
          LINE_NUMBER: ${{ inputs.lineNumber }}
          STACK_TRACE: ${{ inputs.stackTrace }}
          RAW_BODY: ${{ inputs.rawBody }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{"type":"module"}' > /tmp/package.json
          npx tsx /tmp/fix-from-error.ts
